services:
  - type: web
    name: antivol
    runtime: python
    repo: https://github.com/Chrisbeal98/projet_L3
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: antivol-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.12.0

databases:
  - name: antivol-db
    databaseName: antivol
    plan: free
