<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="theme-color" content="#02000e">
    <title>AntiVol — Appareil Verrouillé</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: #02000e;
            color: white;
            min-height: 100vh;
            min-height: 100dvh;
            overflow: hidden;
            overscroll-behavior: none;
            -webkit-overflow-scrolling: none;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            width: 100%;
            height: 100%;
        }
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .status-bar {
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid rgba(59, 130, 246, 0.3);
            border-radius: 12px;
            padding: 12px 20px;
            margin-bottom: 20px;
            text-align: center;
            font-size: 14px;
            position: fixed;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
        }
        .status-bar.connected { border-color: rgba(34, 197, 94, 0.5); color: #22c55e; }
        .status-bar.error { border-color: rgba(239, 68, 68, 0.5); color: #ef4444; }
        .device-info {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 24px;
            width: 100%;
            max-width: 400px;
            margin-bottom: 20px;
        }
        .device-info h2 { font-size: 18px; margin-bottom: 16px; }
        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 14px;
        }
        .info-row:last-child { border: none; }
        .info-label { color: #64748b; }
        .info-value { font-weight: 600; }

        .lock-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1a0000, #0a0015, #000820);
            z-index: 2147483647;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: lockFadeIn 0.3s ease;
            touch-action: none;
            overscroll-behavior: none;
        }
        .lock-content {
            text-align: center;
            padding: 40px 30px;
            max-width: 380px;
            width: 90%;
            background: rgba(20, 0, 30, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 20px;
            box-shadow: 0 0 60px rgba(239, 68, 68, 0.3);
        }
        .lock-icon {
            margin-bottom: 24px;
            animation: lockPulse 2s ease-in-out infinite;
        }
        .lock-icon svg { color: #ef4444; }
        .lock-content h1 {
            font-size: 26px;
            font-weight: 800;
            color: #ef4444;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .lock-content p {
            font-size: 15px;
            color: #94a3b8;
            margin-bottom: 8px;
        }
        .warning-text {
            color: #f59e0b !important;
            font-weight: 600;
            font-size: 13px !important;
            margin-bottom: 20px !important;
        }
        .lock-code-display {
            background: rgba(239, 68, 68, 0.1);
            border: 1px dashed rgba(239, 68, 68, 0.4);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 20px;
        }
        .lock-code-display .code-label {
            font-size: 12px;
            color: #64748b;
            margin-bottom: 6px;
        }
        .lock-code-display .code-value {
            font-size: 32px;
            font-weight: 900;
            color: #ef4444;
            letter-spacing: 8px;
            font-family: 'Courier New', monospace;
        }
        .unlock-form {
            margin-top: 16px;
        }
        .unlock-form input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 10px;
            color: white;
            font-size: 18px;
            text-align: center;
            letter-spacing: 6px;
            outline: none;
            font-family: 'Courier New', monospace;
            margin-bottom: 12px;
        }
        .unlock-form input:focus {
            border-color: #ef4444;
            box-shadow: 0 0 20px rgba(239, 68, 68, 0.2);
        }
        .unlock-form button {
            width: 100%;
            padding: 14px;
            background: #ef4444;
            border: none;
            border-radius: 10px;
            color: white;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            transition: all 0.2s;
        }
        .unlock-form button:active {
            transform: scale(0.97);
            background: #dc2626;
        }
        .unlock-error {
            color: #ef4444;
            font-size: 13px;
            margin-top: 8px;
            min-height: 20px;
        }
        .location-sent {
            margin-top: 16px;
            padding: 10px;
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.3);
            border-radius: 8px;
            font-size: 12px;
            color: #22c55e;
        }
        .device-id-info {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        .device-id-info p {
            color: #64748b;
            font-size: 11px;
            font-family: monospace;
            margin-bottom: 2px;
        }
        @keyframes lockFadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes lockPulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.8; }
        }

        #mainContent { display: none; }
    </style>
</head>
<body oncontextmenu="return false" ondragstart="return false" onselectstart="return false">

    <div id="mainContent">
        <div class="status-bar" id="statusBar">Vérification en cours...</div>
        <div class="device-info">
            <h2>État de l'appareil</h2>
            <div class="info-row">
                <span class="info-label">IMEI</span>
                <span class="info-value" id="imeiDisplay">—</span>
            </div>
            <div class="info-row">
                <span class="info-label">Statut</span>
                <span class="info-value" id="statutDisplay">—</span>
            </div>
            <div class="info-row">
                <span class="info-label">Verrouillé</span>
                <span class="info-value" id="lockedDisplay">—</span>
            </div>
        </div>
    </div>

    <script>
        const API_URL = window.location.protocol + '//' + window.location.host + '/api';
        const POLL_INTERVAL = 3000;
        let APPAREIL_ID = null;
        let IMEI = 'Inconnu';
        let CODE_VERROUILLAGE = '';
        let isLocked = false;
        let lockOverlay = null;
        let wakeLock = null;

        // ═══════════════════════════════════════════
        // BLOCAGE TOTAL — empecher toute interaction
        // ═══════════════════════════════════════════

        // Bloquer toutes les touches du clavier
        document.addEventListener('keydown', function(e) {
            if (isLocked) {
                e.preventDefault();
                e.stopPropagation();
                e.stopImmediatePropagation();
                return false;
            }
        }, true);

        // Bloquer les gestes tactiles (swipe, pull-to-refresh, etc.)
        document.addEventListener('touchmove', function(e) {
            if (isLocked) {
                e.preventDefault();
                return false;
            }
        }, { passive: false, capture: true });

        // Bloquer le geste de tirage vers le bas (pull-to-refresh)
        document.addEventListener('touchstart', function(e) {
            if (isLocked) {
                var touch = e.touches[0];
                if (touch.clientY < 50) {
                    e.preventDefault();
                    return false;
                }
            }
        }, { passive: false, capture: true });

        // Empêcher le pull-to-refresh via CSS overscroll
        document.body.style.overscrollBehavior = 'none';

        // Bloquer le clic droit
        document.addEventListener('contextmenu', function(e) {
            e.preventDefault();
            return false;
        }, true);

        // ═══════════════════════════════════════════
        // HISTORIQUE — empecher bouton retour
        // ═══════════════════════════════════════════
        function bloquerRetour() {
            history.pushState(null, '', location.href);
            history.pushState(null, '', location.href);
        }

        window.addEventListener('popstate', function(e) {
            if (isLocked) {
                bloquerRetour();
            }
        });

        bloquerRetour();

        window.addEventListener('beforeunload', function(e) {
            if (isLocked) {
                e.preventDefault();
                e.returnValue = '';
                return '';
            }
        });

        // ═══════════════════════════════════════════
        // PLEIN ECRAN
        // ═══════════════════════════════════════════
        function activerPleinEcran() {
            try {
                var el = document.documentElement;
                if (el.requestFullscreen) {
                    el.requestFullscreen().catch(function(){});
                } else if (el.webkitRequestFullscreen) {
                    el.webkitRequestFullscreen();
                } else if (el.msRequestFullscreen) {
                    el.msRequestFullscreen();
                }
            } catch(e) {}
        }

        // ═══════════════════════════════════════════
        // WAKE LOCK — garder l'ecran allume
        // ═══════════════════════════════════════════
        async function activerWakeLock() {
            try {
                if ('wakeLock' in navigator) {
                    wakeLock = await navigator.wakeLock.request('screen');
                    wakeLock.addEventListener('release', function() {
                        setTimeout(activerWakeLock, 1000);
                    });
                }
            } catch(e) {}
        }

        document.addEventListener('visibilitychange', function() {
            if (isLocked && document.visibilityState === 'visible') {
                activerWakeLock();
            }
        });

        // ═══════════════════════════════════════════
        // CHARGEMENT DES APPAREILS
        // ═══════════════════════════════════════════
        function chargerAppareils() {
            fetch(API_URL + '/appareils', { credentials: 'include' })
                .then(function(r) { return r.json(); })
                .then(function(appareils) {
                    if (appareils && appareils.length > 0) {
                        var app = appareils[0];
                        APPAREIL_ID = app.id;
                        IMEI = app.imei;
                        CODE_VERROUILLAGE = app.code_verrouillage || '';
                        document.getElementById('imeiDisplay').textContent = IMEI;
                        checkDeviceStatus();
                        setInterval(checkDeviceStatus, POLL_INTERVAL);
                    } else {
                        document.getElementById('statusBar').textContent = 'Aucun appareil';
                        document.getElementById('statusBar').className = 'status-bar error';
                    }
                })
                .catch(function(err) {
                    document.getElementById('statusBar').textContent = 'Erreur: ' + err.message;
                    document.getElementById('statusBar').className = 'status-bar error';
                });
        }

        // ═══════════════════════════════════════════
        // ECRAN DE VERROUILLAGE INUTILISABLE
        // ═══════════════════════════════════════════
        function showLockScreen() {
            if (lockOverlay) return;

            activerPleinEcran();
            activerWakeLock();

            lockOverlay = document.createElement('div');
            lockOverlay.id = 'antivol-lock-screen';
            lockOverlay.className = 'lock-overlay';

            var codeHtml = CODE_VERROUILLAGE
                ? '<div class="lock-code-display">' +
                  '<div class="code-label">Code de déverrouillage</div>' +
                  '<div class="code-value">' + CODE_VERROUILLAGE + '</div>' +
                  '</div>'
                : '';

            lockOverlay.innerHTML =
                '<div class="lock-content">' +
                    '<div class="lock-icon">' +
                        '<svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">' +
                            '<rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>' +
                            '<path d="M7 11V7a5 5 0 0 1 10 0v4"/>' +
                            '<circle cx="12" cy="16" r="1"/>' +
                        '</svg>' +
                    '</div>' +
                    '<h1>Appareil Verrouillé</h1>' +
                    '<p>Ce téléphone a été volé ! La localisation envoyée.</p>' +
                    '<p class="warning-text">Contactez le propriétaire ou les autorités.</p>' +
                    codeHtml +
                    '<div class="unlock-form">' +
                        '<input type="tel" id="unlock-code-input" placeholder="Entrez le code" maxlength="10" autocomplete="off" inputmode="numeric" />' +
                        '<button id="unlock-btn" onclick="attemptUnlock()">Déverrouiller</button>' +
                        '<div class="unlock-error" id="unlock-error"></div>' +
                    '</div>' +
                    '<div class="location-sent">Localisation en cours de transmission...</div>' +
                    '<div class="device-id-info">' +
                        '<p>IMEI: ' + IMEI + '</p>' +
                        '<p>ID: ' + APPAREIL_ID + '</p>' +
                    '</div>' +
                '</div>';

            document.body.appendChild(lockOverlay);
            isLocked = true;

            // Re-bloquer le retour apres ajout de l'overlay
            bloquerRetour();

            // Empêcher les clics sur l'overlay de naviguer
            lockOverlay.addEventListener('click', function(e) {
                e.stopPropagation();
            });

            // Empêcher le zoom sur l'input
            var codeInput = document.getElementById('unlock-code-input');
            if (codeInput) {
                codeInput.addEventListener('touchstart', function(e) {
                    e.stopPropagation();
                }, { passive: true });
                codeInput.addEventListener('touchend', function(e) {
                    e.stopPropagation();
                }, { passive: true });
                // Focus sur l'input
                setTimeout(function() { codeInput.focus(); }, 500);
            }
        }

        function hideLockScreen() {
            if (lockOverlay) {
                lockOverlay.remove();
                lockOverlay = null;
            }
            isLocked = false;

            // Sortir du plein écran
            try {
                if (document.exitFullscreen) {
                    document.exitFullscreen().catch(function(){});
                } else if (document.webkitExitFullscreen) {
                    document.webkitExitFullscreen();
                }
            } catch(e) {}

            // Libérer le wake lock
            if (wakeLock) {
                wakeLock.release();
                wakeLock = null;
            }
        }

        // ═══════════════════════════════════════════
        // TENTATIVE DE DÉVERROUILLAGE
        // ═══════════════════════════════════════════
        function attemptUnlock() {
            var input = document.getElementById('unlock-code-input');
            var errorMsg = document.getElementById('unlock-error');
            var code = input ? input.value.trim() : '';

            if (!code) {
                errorMsg.textContent = 'Entrez le code de déverrouillage.';
                return;
            }

            errorMsg.textContent = 'Vérification...';

            fetch(API_URL + '/appareils/' + APPAREIL_ID + '/verifier-code', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({code: code})
            })
            .then(function(res) { return res.json(); })
            .then(function(data) {
                if (data.statut === 'actif') {
                    hideLockScreen();
                    errorMsg.textContent = '';
                } else {
                    errorMsg.textContent = data.error || 'Code incorrect. Réessayez.';
                    if (input) input.value = '';
                }
            })
            .catch(function() {
                errorMsg.textContent = 'Erreur réseau. Réessayez.';
            });
        }

        // ═══════════════════════════════════════════
        // POLLING DU STATUT
        // ═══════════════════════════════════════════
        function checkDeviceStatus() {
            if (!APPAREIL_ID) return;

            fetch(API_URL + '/appareils/' + APPAREIL_ID + '/statut')
                .then(function(res) {
                    if (!res.ok) throw new Error('HTTP ' + res.status);
                    return res.json();
                })
                .then(function(data) {
                    document.getElementById('statusBar').textContent = 'Connecté au serveur';
                    document.getElementById('statusBar').className = 'status-bar connected';
                    document.getElementById('imeiDisplay').textContent = data.imei;
                    document.getElementById('statutDisplay').textContent = data.statut;
                    document.getElementById('statutDisplay').style.color =
                        data.verrouille ? '#ef4444' : '#22c55e';
                    document.getElementById('lockedDisplay').textContent =
                        data.verrouille ? 'OUI' : 'NON';
                    document.getElementById('lockedDisplay').style.color =
                        data.verrouille ? '#ef4444' : '#22c55e';

                    if (data.verrouille && !isLocked) {
                        CODE_VERROUILLAGE = data.code_verrouillage || CODE_VERROUILLAGE;
                        showLockScreen();
                    } else if (!data.verrouille && isLocked) {
                        hideLockScreen();
                    }
                })
                .catch(function(err) {
                    document.getElementById('statusBar').textContent = 'Erreur: ' + err.message;
                    document.getElementById('statusBar').className = 'status-bar error';
                });
        }

        // ═══════════════════════════════════════════
        // EMPECHER LA FERMETURE DE PAGE
        // ═══════════════════════════════════════════
        window.addEventListener('pagehide', function(e) {
            if (isLocked) {
                e.preventDefault();
            }
        });

        // Re-verrouiller si l'onglet redevient visible
        document.addEventListener('visibilitychange', function() {
            if (isLocked && document.visibilityState === 'visible') {
                if (!lockOverlay) {
                    showLockScreen();
                }
                checkDeviceStatus();
            }
        });

        // ═══════════════════════════════════════════
        // DÉMARRAGE
        // ═══════════════════════════════════════════
        chargerAppareils();
    </script>
</body>
</html>
